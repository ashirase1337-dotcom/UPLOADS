app = "anbu-relay-prod"
primary_region = "sin"  # Singapore — malapit sa PH!

[build]

[http_service]
  internal_port = 8080
  force_https = false
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[services]]
  protocol = "tcp"
  internal_port = 8080

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.ports]]
    port = 8080
    handlers = []

  [services.concurrency]
    type = "connections"
    hard_limit = 256
    soft_limit = 200

[env]
  RUST_LOG = "info"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
